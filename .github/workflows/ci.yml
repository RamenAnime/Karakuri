name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,research]"
      - name: Ruff
        run: ruff check karakuri tests mutable/templates

  test:
    name: Test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,research]"
      - name: Run test suite
        run: python -m pytest --cov=karakuri --cov-report=term-missing
      - name: Validate STL meshes
        run: python scripts/validate_stl.py
      - name: Verify robotics baseline configuration
        run: python scripts/verify_system_integrity.py
      - name: Verify non-editable install
        run: python scripts/verify_non_editable_install.py
      - name: Doctor smoke test
        run: python -m karakuri doctor
      - name: Planner smoke test
        run: python -m karakuri plan --json
      - name: Validate shipped missions
        run: python -m karakuri validate
