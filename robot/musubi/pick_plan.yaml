version: 1
subsystem: musubi
description: Pick-to-box manipulation schema (結)

ros2:
  package: musubi_manipulation
  node: pick_place_server
  action: /musubi/pick_place
  services:
    plan_valid: /musubi/validate_plan

# Physical arm: 5 DOF plus claw, Feetech STS3215 serial bus servos.
# The wrist roll runs the servo in multi-turn mode, which is what gives
# the claw unlimited 360 degree rotation with position feedback.
arm:
  servo_model: STS3215 serial bus
  base_height_mm: 70
  upper_arm_mm: 100
  forearm_mm: 80
  joints:
    - id: base_yaw
      range_deg: [-150, 150]
    - id: shoulder_pitch
      range_deg: [-10, 100]
    - id: elbow_pitch
      range_deg: [-130, 0]
    - id: wrist_pitch
      range_deg: [-90, 90]
    - id: wrist_roll
      continuous: true
    - id: claw
      range_deg: [0, 70]
  claw:
    open_width_m: 0.06
    close_width_m: 0.0

schema:
  pick_plan:
    type: object
    required:
      - mission_id
      - steps
    properties:
      mission_id:
        type: string
      workspace_frame:
        type: string
        default: base_link
      steps:
        type: array
        min_items: 1
        items:
          type: object
          required:
            - step_id
            - object_class
            - action
          properties:
            step_id:
              type: string
            object_class:
              type: string
              enum: [toy, trash]
            action:
              type: string
              enum: [pick, place, retreat]
            detection_topic:
              type: string
              default: /shikai/detections
            place_target_class:
              type: string
              default: toy_box
            approach:
              type: object
              properties:
                offset_z_m:
                  type: number
                  default: 0.08
                max_reach_m:
                  type: number
                  default: 0.35
            gripper:
              type: object
              properties:
                close_width_m:
                  type: number
                open_width_m:
                  type: number

example:
  mission_id: toys_to_box_001
  workspace_frame: base_link
  steps:
    - step_id: pick_toy
      object_class: toy
      action: pick
      approach:
        offset_z_m: 0.08
        max_reach_m: 0.35
      gripper:
        close_width_m: 0.02
        open_width_m: 0.06
    - step_id: place_in_box
      object_class: toy
      action: place
      place_target_class: toy_box
      gripper:
        open_width_m: 0.06
    - step_id: retreat
      object_class: toy
      action: retreat
